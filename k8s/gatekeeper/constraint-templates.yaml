apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdenyprivileged
spec:
  crd:
    spec:
      names:
        kind: K8sDenyPrivileged
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdenyprivileged

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          container.securityContext.privileged == true
          msg := sprintf("Privileged container denied: %v", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          container.securityContext.privileged == true
          msg := sprintf("Privileged init container denied: %v", [container.name])
        }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdenyhostnamespace
spec:
  crd:
    spec:
      names:
        kind: K8sDenyHostNamespace
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdenyhostnamespace

        violation[{"msg": msg}] {
          input.review.object.spec.hostNetwork == true
          msg := "Host network access denied"
        }

        violation[{"msg": msg}] {
          input.review.object.spec.hostPID == true
          msg := "Host PID namespace access denied"
        }

        violation[{"msg": msg}] {
          input.review.object.spec.hostIPC == true
          msg := "Host IPC namespace access denied"
        }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdenyrunasroot
spec:
  crd:
    spec:
      names:
        kind: K8sDenyRunAsRoot
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdenyrunasroot

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.securityContext.runAsNonRoot
          msg := sprintf("Container must set runAsNonRoot: %v", [container.name])
        }
