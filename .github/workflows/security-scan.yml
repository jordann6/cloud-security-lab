name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tfsec:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true

  trivy-iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM

  trivy-image:
    name: Trivy Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy image scan (Amazon Linux 2023)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: public.ecr.aws/amazonlinux/amazonlinux:2023
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
