<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Gradient backgrounds -->
    <linearGradient id="vpcGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4E9F0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow markers -->
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#D13212" />
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#FF9900" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1D8102" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="1000" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="700" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#232F3E">
    Cloud Security Lab - Attack &amp; Defense Architecture
  </text>
  
  <!-- Legend -->
  <g transform="translate(50, 70)">
    <text x="0" y="0" font-family="Arial" font-size="14" font-weight="bold" fill="#232F3E">Legend:</text>
    <line x1="0" y1="15" x2="60" y2="15" stroke="#D13212" stroke-width="3" marker-end="url(#arrowRed)"/>
    <text x="70" y="20" font-family="Arial" font-size="12" fill="#232F3E">Attack Flow</text>
    
    <line x1="0" y1="35" x2="60" y2="35" stroke="#FF9900" stroke-width="3" marker-end="url(#arrowYellow)"/>
    <text x="70" y="40" font-family="Arial" font-size="12" fill="#232F3E">Detection Flow</text>
    
    <line x1="0" y1="55" x2="60" y2="55" stroke="#1D8102" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <text x="70" y="60" font-family="Arial" font-size="12" fill="#232F3E">Remediation Flow</text>
  </g>
  
  <!-- VPC Container -->
  <rect x="100" y="150" width="1200" height="750" rx="10" fill="url(#vpcGradient)" stroke="#3B48CC" stroke-width="3"/>
  <text x="120" y="180" font-family="Arial" font-size="18" font-weight="bold" fill="#3B48CC">VPC (10.0.0.0/16)</text>
  
  <!-- Public Subnets -->
  <rect x="150" y="220" width="1100" height="620" rx="5" fill="#E6F2E6" stroke="#1D8102" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="170" y="250" font-family="Arial" font-size="14" font-weight="bold" fill="#1D8102">Public Subnets (Multi-AZ)</text>
  
  <!-- EC2 Attacker Instance -->
  <g transform="translate(300, 320)">
    <rect x="-60" y="-40" width="120" height="100" rx="5" fill="#FF6B6B" stroke="#D13212" stroke-width="2"/>
    <rect x="-50" y="-30" width="100" height="20" fill="#FFFFFF" rx="3"/>
    <rect x="-50" y="-5" width="100" height="8" fill="#E0E0E0" rx="2"/>
    <rect x="-50" y="8" width="100" height="8" fill="#E0E0E0" rx="2"/>
    <rect x="-50" y="21" width="100" height="8" fill="#E0E0E0" rx="2"/>
    <text x="0" y="70" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#232F3E">EC2 Attacker</text>
    <text x="0" y="85" font-family="Arial" font-size="10" text-anchor="middle" fill="#666">(Stratus Red Team)</text>
  </g>
  
  <!-- EKS Cluster -->
  <g transform="translate(900, 350)">
    <rect x="-130" y="-60" width="260" height="200" rx="8" fill="#FFE6CC" stroke="#FF9900" stroke-width="3"/>
    <text x="0" y="-35" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#232F3E">EKS Cluster</text>
    
    <!-- Falco Pod -->
    <rect x="-110" y="-10" width="100" height="70" rx="5" fill="#FFFFFF" stroke="#3B48CC" stroke-width="2"/>
    <circle cx="-60" cy="10" r="8" fill="#3B48CC"/>
    <text x="-60" y="35" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#232F3E">Falco</text>
    <text x="-60" y="48" font-family="Arial" font-size="9" text-anchor="middle" fill="#666">(Runtime)</text>
    
    <!-- OPA Pod -->
    <rect x="10" y="-10" width="100" height="70" rx="5" fill="#FFFFFF" stroke="#3B48CC" stroke-width="2"/>
    <circle cx="60" cy="10" r="8" fill="#3B48CC"/>
    <text x="60" y="35" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#232F3E">OPA</text>
    <text x="60" y="48" font-family="Arial" font-size="9" text-anchor="middle" fill="#666">(Admission)</text>
    
    <!-- Workload Pods -->
    <rect x="-110" y="75" width="220" height="45" rx="5" fill="#E8F4F8" stroke="#87CEEB" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="0" y="102" font-family="Arial" font-size="10" text-anchor="middle" fill="#666">Application Pods</text>
  </g>
  
  <!-- S3 Bucket (Target) -->
  <g transform="translate(900, 650)">
    <path d="M -50,-30 L 50,-30 L 50,10 Q 50,20 40,25 L -40,25 Q -50,20 -50,10 Z" fill="#569A31" stroke="#3F7021" stroke-width="2"/>
    <ellipse cx="0" cy="-30" rx="50" ry="10" fill="#7AB954" stroke="#3F7021" stroke-width="2"/>
    <text x="0" y="50" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#232F3E">S3 Bucket</text>
    <text x="0" y="65" font-family="Arial" font-size="10" text-anchor="middle" fill="#666">(Attack Target)</text>
  </g>
  
  <!-- OpenSearch Domain -->
  <g transform="translate(300, 650)">
    <rect x="-70" y="-35" width="140" height="80" rx="5" fill="#4A90E2" stroke="#3B48CC" stroke-width="2"/>
    <circle cx="-30" cy="-5" r="12" fill="#FFFFFF"/>
    <circle cx="0" cy="-5" r="12" fill="#FFFFFF"/>
    <circle cx="30" cy="-5" r="12" fill="#FFFFFF"/>
    <path d="M -40,15 L 40,15" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M -40,25 L 40,25" stroke="#FFFFFF" stroke-width="2"/>
    <text x="0" y="65" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#232F3E">OpenSearch</text>
    <text x="0" y="80" font-family="Arial" font-size="10" text-anchor="middle" fill="#666">(SIEM)</text>
  </g>
  
  <!-- CloudWatch Logs -->
  <g transform="translate(1100, 650)">
    <rect x="-60" y="-30" width="120" height="70" rx="5" fill="#FF9900" stroke="#E67300" stroke-width="2"/>
    <path d="M -30,-5 L -30,15 M -10,-5 L -10,15 M 10,-5 L 10,15 M 30,-5 L 30,15" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M -35,0 Q -30,-10 -20,0 T 0,0 T 20,0 T 35,0" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <text x="0" y="60" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#232F3E">CloudWatch</text>
    <text x="0" y="73" font-family="Arial" font-size="9" text-anchor="middle" fill="#666">Logs</text>
  </g>
  
  <!-- Lambda Function -->
  <g transform="translate(500, 780)">
    <path d="M -40,-25 L -25,-40 L 25,-40 L 40,-25 L 40,25 L 25,40 L -25,40 L -40,25 Z" fill="#FF9900" stroke="#E67300" stroke-width="2"/>
    <text x="0" y="5" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#FFFFFF">λ</text>
    <text x="0" y="60" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#232F3E">Lambda</text>
    <text x="0" y="73" font-family="Arial" font-size="9" text-anchor="middle" fill="#666">Remediation</text>
  </g>
  
  <!-- SNS Topic -->
  <g transform="translate(700, 780)">
    <rect x="-50" y="-30" width="100" height="60" rx="5" fill="#E94B3C" stroke="#C62F20" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="#FFFFFF"/>
    <path d="M -8,-8 L 8,8 M 8,-8 L -8,8" stroke="#E94B3C" stroke-width="3"/>
    <text x="0" y="50" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#232F3E">SNS Topic</text>
    <text x="0" y="63" font-family="Arial" font-size="9" text-anchor="middle" fill="#666">Alerts</text>
  </g>
  
  <!-- Internet Gateway -->
  <g transform="translate(300, 140)">
    <rect x="-40" y="-15" width="80" height="30" rx="3" fill="#3B48CC" stroke="#232F3E" stroke-width="2"/>
    <circle cx="-15" cy="0" r="5" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="5" fill="#FFFFFF"/>
    <circle cx="15" cy="0" r="5" fill="#FFFFFF"/>
    <text x="0" y="30" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#232F3E">IGW</text>
  </g>
  
  <!-- Attack Flow Arrows (Red) -->
  <path d="M 300,240 L 300,280" stroke="#D13212" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>
  <path d="M 360,350 L 700,350 L 700,600 L 850,620" stroke="#D13212" stroke-width="3" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="10,5"/>
  
  <!-- Detection Flow Arrows (Yellow) -->
  <path d="M 840,400 L 700,400 L 700,550 L 370,600" stroke="#FF9900" stroke-width="3" fill="none" marker-end="url(#arrowYellow)"/>
  <path d="M 900,450 L 900,550 L 1100,600" stroke="#FF9900" stroke-width="3" fill="none" marker-end="url(#arrowYellow)"/>
  
  <!-- Remediation Flow Arrows (Green) -->
  <path d="M 300,700 L 300,740 L 460,760" stroke="#1D8102" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 540,770 L 650,770" stroke="#1D8102" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 500,740 L 500,550 L 800,400" stroke="#1D8102" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  
  <!-- Labels for key flows -->
  <g transform="translate(550, 330)">
    <rect x="-60" y="-12" width="120" height="24" rx="3" fill="#FFFFFF" stroke="#D13212" stroke-width="1"/>
    <text x="0" y="5" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#D13212">1. Privilege Esc</text>
  </g>
  
  <g transform="translate(550, 570)">
    <rect x="-70" y="-12" width="140" height="24" rx="3" fill="#FFFFFF" stroke="#FF9900" stroke-width="1"/>
    <text x="0" y="5" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#FF9900">2. Falco Detection</text>
  </g>
  
  <g transform="translate(620, 720)">
    <rect x="-75" y="-12" width="150" height="24" rx="3" fill="#FFFFFF" stroke="#1D8102" stroke-width="1"/>
    <text x="0" y="5" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#1D8102">3. Auto Remediation</text>
  </g>
  
  <!-- Bottom annotations -->
  <text x="700" y="950" font-family="Arial" font-size="12" text-anchor="middle" fill="#666">
    Built with Terraform | Attack: Stratus Red Team | Defense: Falco + OPA + Lambda
  </text>
</svg>
